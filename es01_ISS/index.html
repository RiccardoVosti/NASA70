    import * as THREE from 'three';

    // --- SETUP ---
    const scene = new THREE.Scene();

const cloudTexture = loader.load('/img/clouds.jpg');

function createTextLabel(text) {
  const canvas = document.createElement('canvas');
  const context = canvas.getContext('2d');
  canvas.width = 256;
  canvas.height = 64;

  // Style the text
  context.font = 'bold 24px Inter, Arial';
  context.fillStyle = 'white';
  context.textAlign = 'center';
  context.fillText(text, 128, 45);

  const texture = new THREE.CanvasTexture(canvas);
  const spriteMaterial = new THREE.SpriteMaterial({ 
    map: texture,
    transparent: true,
    depthTest: false,  // Allows it to be seen through the globe/other objects
    depthWrite: false  // Prevents it from "cutting holes" in other objects
  });
  
  const sprite = new THREE.Sprite(spriteMaterial);
  
  // FORCE this to be drawn last (higher number = drawn later)
  sprite.renderOrder = 999; 
  
  // Adjust scale to keep text legible
  sprite.scale.set(2, 0.5, 1); 
  return sprite;
}

const pulseGeo = new THREE.RingGeometry(0.5, 0.51, 100);

const pulseMat = new THREE.MeshBasicMaterial({

  opacity: 0.8,
  side: THREE.DoubleSide,
  depthWrite: false // Fixes "box" transparency issues with PNGs
});

    // --- FUNCTIONS ---
    function latLonToVector3(lat, lon, radius) {
      const phi = (90 - lat) * (Math.PI / 180);
      const theta = (lon + 180) * (Math.PI / 180);
      return new THREE.Vector3(
        -radius * Math.sin(phi) * Math.cos(theta),
        radius * Math.cos(phi),
        radius * Math.sin(phi) * Math.sin(theta)
      );
    }

    let targetPos = new THREE.Vector3(0, 0, 5.5);

    async function updateISS() {
      const proxy = "https://corsproxy.io/?";
      const target = encodeURIComponent("http://api.open-notify.org/iss-now.json?t=" + Date.now());
      
      try {
        const r = await fetch(proxy + target);
        const data = await r.json();
        const lat = parseFloat(data.iss_position.latitude);
        const lon = parseFloat(data.iss_position.longitude);

        document.getElementById("lat").innerText = "LAT " + lat.toFixed(4);
        document.getElementById("lon").innerText = "LON " + lon.toFixed(4);

        targetPos = latLonToVector3(lat, lon, 5.5);
        updateCountryName(lat, lon);
      } catch (e) { console.error(e); }
    }

    async function updateCountryName(lat, lon) {
      const geoApi = `https://nominatim.openstreetmap.org/reverse?format=jsonv2&lat=${lat}&lon=${lon}`;
      try {
        const r = await fetch(geoApi);
        const data = await r.json();
        document.getElementById("location").innerText = 
          (data.address && data.address.country) ? data.address.country.toUpperCase() : "SOPRA - OCEANO";
      } catch { document.getElementById("location").innerText = "OFFLINE"; }
    }

    function updateClock() {
      const now = new Date();
      document.getElementById("time").innerText = now.toLocaleTimeString('en-GB');
      document.getElementById("date").innerText = now.toLocaleDateString('en-GB');
    }

    // --- ANIMATION LOOP ---
function animate() {
  requestAnimationFrame(animate);
  
  controls.update();
  iss.position.lerp(targetPos, 0.05);

  // 1. Keep pulse positioned on the ISS manually
  pulse.position.copy(iss.position);

  // 2. Pulse Animation Logic
 pulseScale += 0.004;   

pulseOpacity -= 0.004; 

if (pulseOpacity <= 0) {
  pulseScale = 0.1;    
  pulseOpacity = 0.8;  
}

clouds.rotation.y += 0.00001;
clouds.rotation.x += 0.00003;

  // Since it's no longer a child of a scaled object, 
  // uniform scaling (X, X, X) will keep it a perfect circle.
  pulse.scale.set(pulseScale, pulseScale, pulseScale);
  pulse.material.opacity = pulseOpacity;

  // 3. Keep it facing the camera
  pulse.quaternion.copy(camera.quaternion);

  renderer.render(scene, camera);
}

    hudCamera.top = window.innerHeight / 2;
    hudCamera.bottom = -window.innerHeight / 2;
    hudCamera.updateProjectionMatrix();
  }
});

    // START
